name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-southeast-2
  APP_REPOSITORY: tennis-pro
  FLYWAY_REPOSITORY: tennis-pro-flyway

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build jar
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          APP_URI=$REGISTRY/${{ env.APP_REPOSITORY }}
          docker build -t $APP_URI:$IMAGE_TAG -t $APP_URI:latest .
          docker push $APP_URI:$IMAGE_TAG
          docker push $APP_URI:latest

      - name: Build and push flyway image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FLYWAY_URI=$REGISTRY/${{ env.FLYWAY_REPOSITORY }}
          docker build --pull -f Dockerfile.flyway -t $FLYWAY_URI:$IMAGE_TAG -t $FLYWAY_URI:latest .
          docker push $FLYWAY_URI:$IMAGE_TAG
          docker push $FLYWAY_URI:latest